name: Build APK from ZIP

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Unzip and Organize
        run: |
          unzip LiveStreamApp.zip
          # نقل الملفات للرئيسية إذا كانت داخل مجلد فرعي
          find . -maxdepth 2 -name "build.gradle*" -execdir cp -r . ../ \; || true

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Fix Namespace Issue
        # هذا السطر يبحث عن الـ Package Name في المانيفست ويضيفه كـ namespace في build.gradle
        run: |
          PACKAGE_NAME=$(grep -oP 'package="\K[^"]+' app/src/main/AndroidManifest.xml)
          sed -i "/android {/a \    namespace '$PACKAGE_NAME'" app/build.gradle || true

      - name: Build with Installed Gradle
        run: gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LiveStream-App
          path: "**/build/outputs/apk/debug/*.apk"
