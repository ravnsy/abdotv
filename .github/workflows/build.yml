name: Build APK from ZIP

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Unzip and Organize
        run: |
          unzip LiveStreamApp.zip
          find . -maxdepth 2 -name "build.gradle*" -execdir cp -r . ../ \; || true

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        # سنستخدم إصدار 8.0 لأنه الأكثر استقراراً لمشاريع سكتشوير
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.0

      - name: Fix AndroidX, Namespace and Manifest
        run: |
          echo "android.useAndroidX=true" >> gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          
          # استخراج اسم الحزمة وحذفها من المانيفست لتجنب التعارض
          PACKAGE_NAME=$(grep -oP 'package="\K[^"]+' app/src/main/AndroidManifest.xml)
          sed -i 's/package="[^"]*"//g' app/src/main/AndroidManifest.xml
          
          # إضافة الـ namespace لملف build.gradle
          sed -i "/android {/a \    namespace '$PACKAGE_NAME'" app/build.gradle || true

      - name: Build APK
        run: gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LiveStream-App
          path: "**/build/outputs/apk/debug/*.apk"
