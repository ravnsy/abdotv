name: Build APK from ZIP

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Unzip and Organize
        run: |
          unzip LiveStreamApp.zip
          # نقل ملفات المشروع للرئيسية إذا كانت داخل مجلد فرعي
          find . -maxdepth 2 -name "build.gradle*" -execdir cp -r . ../ \; || true

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Installed Gradle
        # هنا استخدمنا "gradle" المثبت في السيرفر بدل "./gradlew" المتعب
        run: gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LiveStream-App
          path: "**/build/outputs/apk/debug/*.apk"
