name: Build APK from ZIP

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Unzip and Organize
        run: |
          unzip LiveStreamApp.zip
          # هذا السطر ينقل الملفات من أي مجلد فرعي إلى الواجهة الرئيسية
          find . -maxdepth 2 -name "gradlew" -execdir cp -r . ../ \; || true

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LiveStream-App
          path: "**/build/outputs/apk/debug/*.apk"
